id: ch01
title: Where AI Agents Fail
part: part-00
goal: "Expand the AI-agent failure model for 2026 engineering practice and introduce the boundaries among Prompt -> Context -> Harness plus agent types."
reader_outcomes:
  - "Distinguish a one-off wrong answer from execution failures that include context, permissions, verify, and approvals"
  - "Explain the role differences among an interactive assistant, a local CLI coding agent, and a cloud / background agent"
  - "Understand which artifacts later chapters will add and which signals act as verification evidence"
dependencies:
sections:
  - "Getting one answer right is different from getting work done"
  - "Eight failure classes: wrong answer, poisoning, misuse, omission, and stop"
  - "Design surfaces that reduce failure, and agent types"
  - "The recurring cases and the sample-repo"
  - "Read this book as a book about artifacts"
exercises:
  - "Assign the four agent types to one task and identify where the human approval gate should sit."
  - "Read a failed coding-agent transcript, identify which failure classes chained together, and name the missing artifacts."
artifacts:
  - sample-repo/README.md
  - sample-repo/docs/domain-overview.md
  - sample-repo/docs/seed-issues.md
acceptance_criteria:
  - The chapter follows the standard chapter contract
  - It includes at least one bad / good example pair
  - It includes exactly two exercises
  - All referenced artifacts exist in the repo
  - verify passes
