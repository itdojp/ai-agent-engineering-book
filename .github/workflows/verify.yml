name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Verify book repository artifacts
        run: ./scripts/verify-book.sh

  verify-sample:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Verify sample repository artifacts
        run: ./scripts/verify-sample.sh

  verify-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Verify GitHub Pages build
        run: ./scripts/verify-pages.sh
