name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify scaffold
        run: ./scripts/verify-book.sh
      - name: Verify sample repo
        run: ./scripts/verify-sample.sh
