id: ch01
title: Where AI Agents Fail
part: part-00
goal: Organize the major failure modes of AI agents and introduce the book's maturity model: Prompt Engineering -> Context Engineering -> Harness Engineering.
reader_outcomes:
  - Explain the difference between a one-off correct answer and actual work completion on a long-running task
  - Understand the roles of the sample-repo, ChatGPT, and Codex CLI in this book
  - Understand which artifacts later chapters will add
dependencies:
sections:
  - Getting one answer right is different from getting work done
  - Four failure modes: wrong answer, forgetting, breaking things, stopping early
  - Mapping Prompt Engineering / Context Engineering / Harness Engineering
  - The recurring cases, sample-repo, ChatGPT, and Codex CLI
  - Read this book as a book about artifacts, not slogans
exercises:
  - Read a failed coding agent transcript and identify three missing artifacts.
  - Classify a weak task request by failure mode and propose a better direction.
artifacts:
  - sample-repo/README.md
  - sample-repo/docs/domain-overview.md
  - sample-repo/docs/seed-issues.md
acceptance_criteria:
  - The chapter follows the standard chapter contract
  - It includes at least one bad / good example pair
  - It includes exactly two exercises
  - All referenced artifacts exist in the repo
  - verify passes
