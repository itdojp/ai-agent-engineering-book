name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify book scaffold
        run: ./scripts/verify-book.sh

  verify-sample:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify sample repo
        run: ./scripts/verify-sample.sh
