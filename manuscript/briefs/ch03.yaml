id: ch03
title: ChatGPTで要件と設計を固める
part: part-01-prompt
goal: 曖昧要求を product spec・acceptance criteria・ADR・eval seed に変換し、interactive assistant と coding agent の責務分担を明確にする。
reader_outcomes:
  - 曖昧な依頼を acceptance criteria と eval seed 付き仕様に変換できる
  - interactive assistant と coding agent に分けて artifact を受け渡せる
  - 人間が残す判断点と AI に委ねる論点整理を分けられる
dependencies:
  - ch01
  - ch02
sections:
  - 曖昧要求を仕様に変える
  - 受け入れ条件と eval seed の分解
  - 代替案比較と設計判断
  - ADR を残す理由
  - 人間が残す判断と assistant / agent の責務分担
exercises:
  - 検索改善要求を product spec + acceptance criteria + eval seed に変換する。
  - interactive assistant と coding agent の分担表を作り、どの artifact を handoff するか明文化する。
artifacts:
  - sample-repo/docs/product-specs/ticket-search.md
  - sample-repo/docs/design-docs/ticket-search-adr.md
  - sample-repo/docs/acceptance-criteria/ticket-search.md
acceptance_criteria:
  - 章本文が標準章構成に従う
  - bad / good example を最低 1 組含む
  - 演習を 2 問含む
  - brief で参照する artifact が repo 上に存在する
  - verify が通る
