id: ch05
title: Context Engineering の基礎
part: part-02-context
goal: Prompt Engineering と Context Engineering の境界を明確にし、永続・タスク・セッション・ツールの context 設計を導入する。
reader_outcomes:
  - Prompt Engineering と Context Engineering の違いを説明できる
  - context budget を設計できる
  - stale context と live context を分離できる
