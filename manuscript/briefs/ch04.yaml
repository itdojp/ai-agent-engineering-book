id: ch04
title: プロンプトを評価する
part: part-01-prompt
goal: Prompt Engineering を prompt / workflow evaluation まで広げ、trace review・cost / latency・judge / human spot-check を含む評価ループを導入する。
reader_outcomes:
  - eval case、rubric、judge / human spot-check を分けて設計できる
  - prompt の回帰比較に加え、workflow metrics と trace review を評価軸へ入れられる
  - モデル更新時の比較観点として品質、tool-call、cost / latency、approval signal を列挙できる
dependencies:
  - ch02
  - ch03
sections:
  - 良い prompt / workflow は評価できる
  - eval set の作り方
  - rubric・golden・judge・human spot-check の違い
  - prompt の回帰テストと trace review
  - versioning と比較運用
exercises:
  - structured output と approval boundary を含む eval case を追加する。
  - v1/v2 prompt を比較し、品質・cost / latency・tool-call の観点で記録する。
artifacts:
  - evals/prompt-contract-cases.json
  - evals/rubrics/feature-spec.json
  - scripts/run-prompt-evals.py
acceptance_criteria:
  - 章本文が標準章構成に従う
  - bad / good example を最低 1 組含む
  - 演習を 2 問含む
  - brief で参照する artifact が repo 上に存在する
  - verify が通る
